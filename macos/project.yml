# XcodeGen spec. Generate the project with:  cd macos && xcodegen generate
name: CanvasAI
options:
  bundleIdPrefix: com.jmw
  deploymentTarget:
    macOS: "13.0"
targets:
  CanvasAI:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Canvas-AI
        CFBundleName: Canvas-AI
        LSMinimumSystemVersion: "13.0"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: CanvasAI.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jmw.CanvasAI
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
